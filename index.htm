<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Galli - AI Image Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container my-5">
      <h1 class="text-center mb-4">Photo Galli - AI Image Generator</h1>
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="input-group mb-3">
            <textarea
              id="prompt"
              class="form-control"
              rows="3"
              placeholder="Enter your text prompt here..."
            ></textarea>
          </div>
          <button id="generateBtn" class="btn btn-primary w-100 mb-3">
            Generate Image
          </button>
          <div id="loading" class="text-center d-none">
            <div class="spinner-border" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p>Generating image...</p>
          </div>
          <div id="error" class="alert alert-danger d-none"></div>
          <div id="imageGallery" class="row"></div>
        </div>
      </div>
      <div class="row justify-content-center mt-4">
        <div class="col-md-8">
          <h3>Prompt History</h3>
          <ul id="history" class="list-group"></ul>
        </div>
      </div>
      <button
        id="themeToggle"
        class="btn btn-secondary position-fixed bottom-0 end-0 m-3"
      >
        Toggle Dark Mode
      </button>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
